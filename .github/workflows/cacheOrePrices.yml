name: Cache Ore Prices
on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: .  # 👈 make sure it checks out into root

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: node src/features/Ores/cacheOrePrices.js

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add public/data/cachedOrePrices.json
          git commit -m "Update cached ore prices [bot]" || echo "No changes"
          git push
